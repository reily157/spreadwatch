name: HIP-4 Spread Scanner

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes (UTC)
  workflow_dispatch:           # allow manual trigger from GitHub UI

permissions:
  contents: write              # needed to commit CSV back to repo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python hip4_scanner.py

      - name: Commit CSV data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No new data" || (
            git commit -m "scan $(date -u +%Y-%m-%dT%H:%M:%SZ)" &&
            git push
          )
